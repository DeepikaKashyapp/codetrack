version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: codetrack_db
    environment:
      POSTGRES_USER: codetrack_user
      POSTGRES_PASSWORD: codetrack_password
      POSTGRES_DB: codetrack_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql

  redis:
    image: redis:7-alpine
    container_name: codetrack_redis
    ports:
      - "6379:6379"

volumes:
  postgres_data:
